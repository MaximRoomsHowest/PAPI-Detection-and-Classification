name: CI

on:
  push:
    branches: [main, cleanup-merge]
  pull_request:
    branches: [main]

# Cancel earlier in-flight runs on the same PR/branch when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python (ruff + pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            apps/backend/requirements.txt

      - name: Install backend + papi + dev deps
        run: |
          python -m pip install --upgrade pip
          # Editable install pulls in numpy/pandas/Pillow/etc. via pyproject.toml.
          pip install -e .[dev]
          # Backend-specific (FastAPI, SQLAlchemy, ultralytics, opencv).
          pip install -r apps/backend/requirements.txt

      - name: Ruff (source only — notebooks intentionally excluded)
        run: ruff check apps/backend packages/papi workflows/scripts

      - name: Pytest — papi package
        run: pytest packages/papi/tests -v

      - name: Pytest — backend
        working-directory: apps/backend
        run: pytest -v

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        # npm install (not npm ci) tolerates the cross-platform lockfile drift
        # documented in apps/frontend/Dockerfile (audit follow-up: regenerate
        # the lockfile from Linux to switch back to npm ci).
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Test (vitest)
        # `vitest run` is single-shot (no watch mode) and exits non-zero
        # on any failing test, matching the contract of `npm run lint` /
        # `pytest` above. Coverage is skipped in CI to keep the step
        # fast; run `npm run test:coverage` locally for the report.
        run: npm test

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: apps/frontend/dist
          if-no-files-found: error
          retention-days: 7

  docker:
    name: Docker (build only — no push)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [python, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: apps/backend
          push: false
          load: false
          tags: papi-backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: apps/frontend
          push: false
          load: false
          tags: papi-frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
