# PAPI Vision frontend — nginx config for the static React bundle.
#
# Runs under nginxinc/nginx-unprivileged so listen port is 8080
# (the image cannot bind to <1024 without root). The docker-compose
# port mapping is the place to expose this on a public port.

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ----------------------------------------------------------------------
    # Security headers (audit F-MAJ-13 / DCK-MAJ-6)
    # ----------------------------------------------------------------------
    # Applied to every response, including the SPA index.html. ``always`` is
    # important — without it, nginx skips these on 4xx/5xx responses.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Baseline Content-Security-Policy. Allows:
    #   - self for scripts/styles (our bundle, including @fontsource/poppins)
    #   - data: + blob: for object URLs (video frames, jsPDF exports)
    #   - 'unsafe-inline' for styles because Plotly + Vite inject inline styles
    #   - the OSM tile server for the iframe-embedded map on the intro page
    # Note: fonts are now self-hosted via @fontsource/poppins (audit F-MAJ-14),
    # so Google Fonts origins are NOT in the allowlist any more. The CSP is
    # tighter now.
    # IMPORTANT: this MUST be one line — nginx does not support multi-line
    # add_header continuations the way bash does; backslashes get sent
    # literally to the browser, which then rejects the entire policy.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob: https://*.tile.openstreetmap.org https://www.openstreetmap.org; media-src 'self' blob: data:; connect-src 'self' http://localhost:8000 http://127.0.0.1:8000; frame-src https://www.openstreetmap.org; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self';" always;

    # Hashed JS/CSS assets — long-cache.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — every unknown route returns index.html so react-router can take over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;
}
