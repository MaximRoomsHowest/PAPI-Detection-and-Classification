# Full-stack PAPI Detection & Classification compose.
#
# Brings up postgres, the FastAPI backend, and the nginx-served frontend
# bundle. The backend model is bind-mounted from ./models so the image stays
# code-only and you can swap weights without rebuilding.
#
# Quick start (local):
#   cp .env.example .env       # adjust values, especially POSTGRES_PASSWORD
#   docker compose up -d --build
#   open http://localhost:5173
#
# For a real deployment, override at least:
#   POSTGRES_PASSWORD          (strong random secret)
#   PAPI_API_KEY               (required when PAPI_ENV=production)
#   PAPI_ENV=production        (flips the security floor — see backend main.py)
#   FRONTEND_PAPI_API_URL      (public hostname the browser reaches the API at)

services:
  postgres:
    image: postgres:16-alpine
    container_name: papi-postgres
    environment:
      POSTGRES_DB: papi_backend
      # ${VAR:?msg} fails fast if the variable is missing from .env (audit
      # DCK-MAJ-1: no more hardcoded papi:papi credentials in compose).
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      # Bind to loopback only (audit DCK-CRIT-1: never expose dev postgres
      # on the LAN with default credentials). The backend container reaches
      # postgres via the compose network, not the host port.
      - "127.0.0.1:5434:5432"
    volumes:
      - papi_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d papi_backend"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  backend:
    build:
      context: ./apps/backend
    container_name: papi-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/papi_backend
      PAPI_MODEL_PATH: /models/serving/best.pt
      PAPI_STORAGE_DIR: /storage
      # JSON-list form: avoids the pydantic-settings CSV-parse issue that
      # crashed the container in earlier builds (audit SMOKE-CRIT-2).
      PAPI_CORS_ORIGINS: '["http://localhost:5173","http://127.0.0.1:5173"]'
      PAPI_CONFIDENCE_THRESHOLD: ${PAPI_CONFIDENCE_THRESHOLD:-0.4}
      PAPI_VIDEO_HISTORY_SIZE: ${PAPI_VIDEO_HISTORY_SIZE:-5}
      PAPI_MAX_UPLOAD_MB: ${PAPI_MAX_UPLOAD_MB:-100}
      PAPI_MAX_VIDEO_FRAMES: ${PAPI_MAX_VIDEO_FRAMES:-600}
      PAPI_MAX_VIDEO_SECONDS: ${PAPI_MAX_VIDEO_SECONDS:-30}
      # Aggregate cap on /api/analyze-frames batch size (audit B-MAJ-5).
      # 200 keeps a folder upload of a normal flight under a few minutes
      # of CPU inference; raise via .env if the demo needs a bigger sweep.
      PAPI_MAX_BATCH_FRAMES: ${PAPI_MAX_BATCH_FRAMES:-200}
      # Security floor: ``production`` makes the API key mandatory at startup.
      PAPI_ENV: ${PAPI_ENV:-local}
      PAPI_API_KEY: ${PAPI_API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      # Model weights are git-ignored binaries living on the host. Bind mount
      # them read-only so the container picks up the current checkpoint
      # without a rebuild.
      - ./models:/models:ro
      # Uploaded originals + annotated exports persist across container
      # restarts in a named volume.
      - papi_backend_storage:/storage
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  frontend:
    build:
      context: ./apps/frontend
      args:
        # Browser-side URL — what the user's machine resolves, not what the
        # container resolves. Override at build time for non-localhost hosts.
        VITE_PAPI_API_URL: ${FRONTEND_PAPI_API_URL:-http://localhost:8000}
    container_name: papi-frontend
    depends_on:
      - backend
    ports:
      # Container listens on 8080 (unprivileged nginx image — audit DCK-MAJ-3).
      # Host port 5173 keeps frontend reachable at the same URL as before.
      - "5173:8080"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  papi_postgres_data:
  papi_backend_storage:
