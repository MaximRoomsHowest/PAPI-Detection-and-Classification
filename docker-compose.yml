services:
  postgres:
    image: postgres:16-alpine
    container_name: papi-postgres
    environment:
      POSTGRES_DB: papi_backend
      POSTGRES_USER: papi
      POSTGRES_PASSWORD: papi
    ports:
      - "5434:5432"
    volumes:
      - papi_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U papi -d papi_backend"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: papi-backend
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgresql+psycopg://papi:papi@postgres:5432/papi_backend
      PAPI_MODEL_PATH: /models/best.pt
      PAPI_STORAGE_DIR: /app/storage
      PAPI_CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data/runs/detect/train-3/weights/best.pt:/models/best.pt:ro
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: papi-frontend
    command: npm run dev -- --host 0.0.0.0 --port 5173
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  papi_postgres_data:
